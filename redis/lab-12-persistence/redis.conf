# =============================================================================
# Redis Persistence Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# RDB (Snapshotting) Configuration
# -----------------------------------------------------------------------------

# บันทึก snapshot ตามเงื่อนไข: save <seconds> <changes>
# save ทุก 3600 วินาที (1 ชม.) ถ้ามีการเปลี่ยนแปลง >= 1 key
save 3600 1

# save ทุก 300 วินาที (5 นาที) ถ้ามีการเปลี่ยนแปลง >= 100 keys
save 300 100

# save ทุก 60 วินาที ถ้ามีการเปลี่ยนแปลง >= 10000 keys
save 60 10000

# ชื่อไฟล์ RDB
dbfilename dump.rdb

# ตำแหน่งเก็บไฟล์ (ทั้ง RDB และ AOF)
dir /data

# หยุดรับ writes ถ้า BGSAVE ล้มเหลว (แนะนำ yes เพื่อความปลอดภัย)
stop-writes-on-bgsave-error yes

# บีบอัดไฟล์ RDB ด้วย LZF compression
# เปิด = ไฟล์เล็กลง แต่ใช้ CPU เพิ่ม
rdbcompression yes

# เพิ่ม CRC64 checksum ท้ายไฟล์ RDB เพื่อตรวจสอบความถูกต้อง
# เปิด = ใช้ CPU เพิ่มเล็กน้อยตอน save/load แต่ปลอดภัยกว่า
rdbchecksum yes

# -----------------------------------------------------------------------------
# AOF (Append Only File) Configuration
# -----------------------------------------------------------------------------

# เปิดใช้ AOF (yes/no)
# เปลี่ยนเป็น yes เพื่อเปิดใช้งาน
appendonly yes

# ชื่อ directory สำหรับ AOF files (Redis 7+)
appenddirname "appendonlydir"

# ชื่อไฟล์ AOF base
appendfilename "appendonly.aof"

# fsync policy — ความถี่ในการเขียนข้อมูลลง disk
# - always    : ทุก write command (ช้าสุด, ปลอดภัยสุด)
# - everysec  : ทุก 1 วินาที (แนะนำ, balance ดี)
# - no        : ให้ OS จัดการ (เร็วสุด, เสี่ยงสุด)
appendfsync everysec

# ระหว่าง BGSAVE หรือ BGREWRITEAOF อย่า fsync
# เปิด = performance ดีขึ้น แต่อาจเสียข้อมูลถ้า crash ระหว่าง rewrite
no-appendfsync-on-rewrite no

# AOF rewrite อัตโนมัติเมื่อไฟล์โตขึ้น N% จากขนาดหลัง rewrite ครั้งก่อน
auto-aof-rewrite-percentage 100

# ขนาดขั้นต่ำก่อน auto rewrite (ป้องกัน rewrite บ่อยตอนไฟล์เล็ก)
auto-aof-rewrite-min-size 64mb

# ใช้ RDB preamble ใน AOF file (Redis 7+ default: yes)
# ทำให้ AOF load เร็วขึ้น
aof-use-rdb-preamble yes

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Bind address (0.0.0.0 = รับ connection จากทุก interface)
bind 0.0.0.0

# ปิด protected mode สำหรับ development (อย่าทำใน production!)
protected-mode no

# Port
port 6379

# Log level (debug, verbose, notice, warning)
loglevel notice
