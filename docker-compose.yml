# Dev stack สำหรับเว็บ dev-labs — Postgres + Adminer
# รัน: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: dev-labs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devlabs
      POSTGRES_PASSWORD: devlabs
      POSTGRES_DB: devlabs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlabs -d devlabs"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:5
    container_name: dev-labs-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
