services:
  mongo1:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo1data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mongonet

  mongo2:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27018:27017"
    volumes:
      - mongo2data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mongonet

  mongo3:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27019:27017"
    volumes:
      - mongo3data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mongonet

  mongo-init:
    image: mongo:7
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    entrypoint: >
      mongosh --host mongo1 --eval '
        try {
          rs.status();
          print("Replica set already initialized");
        } catch(e) {
          rs.initiate({
            _id: "rs0",
            members: [
              { _id: 0, host: "mongo1:27017", priority: 2 },
              { _id: 1, host: "mongo2:27017", priority: 1 },
              { _id: 2, host: "mongo3:27017", priority: 1 }
            ]
          });
          print("Replica set initialized with 3 members");
        }

        // รอให้ primary พร้อม
        sleep(5000);
        rs.status().members.forEach(function(m) {
          print(m.name + " → " + m.stateStr);
        });
      '
    restart: "no"
    networks:
      - mongonet

volumes:
  mongo1data:
  mongo2data:
  mongo3data:

networks:
  mongonet:
    driver: bridge
